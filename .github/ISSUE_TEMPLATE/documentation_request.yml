name: Documentation Request
description: Request missing or unclear documentation
title: "[DOCS] "
labels: documentation
assignees: ''

body:
  - type: markdown
    attributes:
      value: Thank you for helping us improve our documentation.
  - type: textarea
    id: location
    attributes:
      label: Which document or page needs updating?
      description: Provide the file path or URL to the documentation in question.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description of the issue
      description: Describe what is unclear, missing, or incorrect.
    validations:
      required: true